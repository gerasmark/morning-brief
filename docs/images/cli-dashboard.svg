<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">CLI dashboard example</title>
  <desc id="desc">Illustrative terminal dashboard for the Proino Briefing CLI showing overview cards, weather, names, and daily summaries.</desc>
  <rect width="1120" height="560" fill="#0b0f14"/>
  <rect x="4" y="10" width="1112" height="68" fill="none" stroke="#32d3ff" stroke-width="2"/>

  <g font-family="Menlo, Monaco, 'DejaVu Sans Mono', monospace" font-size="15">
    <text x="10" y="33" fill="#f2f7fb" font-size="31" font-weight="700">PROINO BRIEFING</text>
    <text x="10" y="50" fill="#32d3ff" font-size="28">2026-03-11</text>
    <text x="10" y="70" fill="#f2f7fb" font-size="17">[top 15] [strikes 24] [Αθήνα]</text>
  </g>

  <g font-family="Menlo, Monaco, 'DejaVu Sans Mono', monospace" font-size="16">
    <rect x="4" y="112" width="256" height="50" fill="none" stroke="#3191ff" stroke-width="2"/>
    <text x="18" y="121" fill="#3191ff" font-size="14">─ Top Stories ─</text>
    <text x="8" y="135" fill="#54a6ff" font-size="29" font-weight="700">15</text>
    <text x="8" y="157" fill="#a5acb8" font-size="15">ranked clusters</text>

    <rect x="282" y="112" width="256" height="50" fill="none" stroke="#f2e527" stroke-width="2"/>
    <text x="296" y="121" fill="#f2e527" font-size="14">─ Live Strikes ─</text>
    <text x="286" y="135" fill="#f2e527" font-size="29" font-weight="700">24</text>
    <text x="286" y="157" fill="#a5acb8" font-size="15">current transport view</text>

    <rect x="562" y="112" width="256" height="50" fill="none" stroke="#21f2bd" stroke-width="2"/>
    <text x="576" y="121" fill="#21f2bd" font-size="14">─ Weather ─</text>
    <text x="566" y="135" fill="#21f2bd" font-size="29" font-weight="700">16.1°</text>
    <text x="566" y="157" fill="#a5acb8" font-size="15">Συννεφιά</text>

    <rect x="842" y="112" width="256" height="50" fill="none" stroke="#ff59e8" stroke-width="2"/>
    <text x="856" y="121" fill="#ff59e8" font-size="14">─ Names ─</text>
    <text x="846" y="135" fill="#ff59e8" font-size="29" font-weight="700">16</text>
    <text x="846" y="157" fill="#a5acb8" font-size="15">today</text>
  </g>

  <g font-family="Menlo, Monaco, 'DejaVu Sans Mono', monospace" font-size="15">
    <rect x="4" y="195" width="544" height="120" fill="none" stroke="#21f2bd" stroke-width="2"/>
    <text x="18" y="204" fill="#21f2bd" font-size="14">─ Weather ─</text>
    <text x="8" y="223" fill="#f2f7fb">city Αθήνα</text>
    <text x="8" y="243" fill="#f2f7fb">now  16.1° | Συννεφιά</text>
    <text x="8" y="263" fill="#f2f7fb">day  4.2° / 16.4</text>
    <text x="8" y="283" fill="#f2f7fb">rain 0% | wind 8.9 km/h</text>
    <text x="8" y="303" fill="#f2f7fb">2026-03-12  17.3°/4.2  Μερική συννεφιά</text>
    <text x="8" y="323" fill="#f2f7fb">2026-03-13  16.9°/5.0  Μερική συννεφιά</text>

    <rect x="570" y="195" width="546" height="120" fill="none" stroke="#ff59e8" stroke-width="2"/>
    <text x="584" y="204" fill="#ff59e8" font-size="14">─ Daybook ─</text>
    <text x="574" y="223" fill="#f2f7fb">names Θαλλής, Θαλλός, Θαλλής, Θάλεια, Θάλλω, Θεοδώρα,</text>
    <text x="574" y="243" fill="#f2f7fb">Θεοδώρα, Δώρα, Δωρούλα, Ντόρα, Σαβίνα, Ζαμπίνα, Ζαμπία, Σωφρόνιος,</text>
    <text x="574" y="263" fill="#f2f7fb">Σωφρόνης</text>
    <text x="574" y="283" fill="#f2f7fb">quote Την ψυχή σου να περιποιείσαι σαν ηγεμόνα, και το σώμα να</text>
    <text x="574" y="303" fill="#f2f7fb">μεταχειρίζεσαι σαν στρατιώτη | ΚΛΕΙΤΑΡΧΟΣ</text>
  </g>

  <g font-family="Menlo, Monaco, 'DejaVu Sans Mono', monospace" font-size="15">
    <rect x="4" y="348" width="1112" height="164" fill="none" stroke="#32d3ff" stroke-width="2"/>
    <text x="18" y="357" fill="#32d3ff" font-size="14">─ Top Summary ─</text>
    <text x="8" y="380" fill="#f2f7fb">Στην πρώτη πρωινή ενημέρωση, επικεντρωνόμαστε σε μια σειρά σημαντικών γεγονότων που διαμορφώνουν την επικαιρότητα.</text>
    <text x="8" y="401" fill="#f2f7fb">Η Τουρκία αντιμετωπίζει έντονες αντιδράσεις μετά από παραβιάσεις του εναέριου χώρου της, με την τελευταία να αφορά μια τραγική πτώση,</text>
    <text x="8" y="422" fill="#f2f7fb">γεγονός που προκάλεσε επικοινωνία μεταξύ ηγετών και Αραγτσί. Παράλληλα, η υπόθεση της μητέρας που εγκατέλειψε το αυτιστικό της παιδί στη Λαμία</text>
    <text x="8" y="443" fill="#f2f7fb">βρίσκεται στο επίκεντρο των δικαστικών εξελίξεων. Στο παγκόσμιο τομέα, η Μέση Ανατολή παραμένει στο επίκεντρο της προσοχής.</text>
    <text x="8" y="464" fill="#f2f7fb">Ενδεικτικά, αναφέρθηκε πρόσφατα έκρηξη σε δεξαμενόπλοιο κοντά στο Άμπου Ντάμπι, καθώς και μια άλλη, πιο σοβαρή, επίθεση σε βιομηχανικό συγκρότημα</text>
    <text x="8" y="485" fill="#f2f7fb">στην ίδια πόλη, η οποία προκάλεσε πυρκαγιά. Στην Ελλάδα, η σκηνή της Θεσσαλονίκης είναι ακόμα φορτισμένη από τις εξελίξεις της υπόθεσης</text>
    <text x="8" y="506" fill="#f2f7fb">της εκπαιδευτικού Σοφίας Χρηστίδου, ενώ παράλληλα ανακοινώθηκε η έναρξη της πλατφόρμας για το voucher των 750 ευρώ.</text>
  </g>
</svg>
