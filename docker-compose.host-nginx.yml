services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./data/data.db
      ROOT_PATH: ${APP_BASE_PATH}
    volumes:
      - backend_data:/app/backend/data
      - ./backend/.env:/app/backend/.env:ro
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${APP_BASE_PATH}/
        VITE_API_BASE: ${APP_BASE_PATH}/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HOST_BIND_PORT:-3001}:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend_data:
