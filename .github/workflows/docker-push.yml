name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-backend:${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-frontend:${{ github.ref_name }}
          build-args: |
            VITE_APP_BASE_PATH=/
            VITE_API_BASE=/api

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-nginx:latest,${{ secrets.DOCKERHUB_USERNAME }}/morning-brief-nginx:${{ github.ref_name }}